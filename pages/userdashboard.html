<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobeTalk - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/frontend/styles/userdashboard.css">
</head>
<body>
    <div class="min-h-screen bg-globe-blue">
        <!-- Navigation -->
        <nav>
            <a href="#" class="nav-link">Home</a>
            <a href="#" class="nav-link">Find Pen Pal</a>
            <a href="#" class="nav-link">Settings & Safety</a>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- GlobeTalk branding -->
            <h1 class="globetalk-title">GlobeTalk</h1>

            <!-- Dashboard Title -->
            <div class="dashboard-title-container">
                <h2 class="dashboard-title">Dashboard</h2>
            </div>

            <!-- Pen Pal Suggestions Section -->
            <div class="section">
                <h3 class="section-title">Pen Pal Suggestions</h3>

                <div class="cards-container">
                    <!-- User245 Card -->
                    <div class="pen-pal-card">
                        <h4>User245</h4>
                        <div class="pen-pal-info">
                            <p>Region: South Africa</p>
                            <p>Language: Afrikaans</p>
                            <p>Interests: Music, Art</p>
                        </div>
                    </div>

                    <!-- User299 Card -->
                    <div class="pen-pal-card">
                        <h4>User299</h4>
                        <div class="pen-pal-info">
                            <p>Region: USA</p>
                            <p>Language: English</p>
                            <p>Interests: Travel, Cooking</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Active Conversations Section -->
            <div class="section">
                <h3 class="section-title">Active Conversations</h3>

                <div class="conversations-container">
                    <!-- User187 Conversation -->
                    <div class="conversation-item">
                        <h4>User187</h4>
                        <span class="conversation-time">2h</span>
                    </div>

                    <!-- User33 Conversation -->
                    <div class="conversation-item">
                        <h4>User33</h4>
                        <span class="conversation-time">1 day</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
